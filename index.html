<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linaro - Presupuestación Arquitectónica</title>
    <style>
        :root {
            --primary-color: #333;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-muted: #6c757d;
            --error-color: #dc3545;
            --success-color: #198754;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin: 0;
        }
        .tagline {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e0e0e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            font-size: 1rem;
            transition: opacity 0.2s;
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        /* Mensajes de estado */
        .alert {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
            text-align: left;
        }
        .alert.error {
            background: #fff0f0;
            border: 1px solid #f5c6cb;
            color: var(--error-color);
        }
        .alert.success {
            background: #f0fff4;
            border: 1px solid #c3e6cb;
            color: var(--success-color);
        }
        .footer {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <header>
            <h1 class="logo">Linaro</h1>
            <p class="tagline">Presupuestación arquitectónica</p>
        </header>

        <form id="loginForm" onsubmit="doLogin(event)">
            <div class="form-group">
                <label for="email">Usuario / Email</label>
                <input type="email" id="email" placeholder="tu@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit" id="btnSubmit">Ingresar</button>
        </form>

        <div id="alertBox" class="alert"></div>

        <footer class="footer">
            <p id="copyrightText"></p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // =====================================================
        // ⚠️  REEMPLAZA ESTOS VALORES CON LOS DE TU PROYECTO
        //     Supabase → Project Settings → API
        // =====================================================
        const SUPABASE_URL = 'https://iufichpykfkhjednfljy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1ZmljaHB5a2ZraGplZG5mbGp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDI3NzMsImV4cCI6MjA5NDYxODc3M30.0OG0e2Oj_5-uJckF-a0duPDgBmgyYr-3VLJm3HvQRVM';
        // =====================================================

        const _supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function doLogin(event) {
            event.preventDefault();

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('btnSubmit');

            btn.disabled    = true;
            btn.textContent = 'Verificando...';
            hideAlert();

            try {
                const { data, error } = await _supabaseClient.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) {
                    // Mensajes de error en español
                    const mensajes = {
                        'Invalid login credentials': 'Credenciales incorrectas. Verifica tu email y contraseña.',
                        'Email not confirmed':        'Tu email aún no ha sido confirmado. Revisa tu bandeja.',
                        'Too many requests':          'Demasiados intentos. Espera unos minutos e intenta de nuevo.',
                    };
                    const msg = mensajes[error.message] || ('Error: ' + error.message);
                    showAlert('error', msg);
                } else {
                    showAlert('success', `¡Bienvenido a Linaro, ${data.user.email}!`);
                    setTimeout(() => { window.location.href = 'https://asdrubalabadl-droid.github.io/Linaro/Linaro.html'; }, 1000);
                }

            } catch (err) {
                showAlert('error', 'Error de red. Verifica tu conexión e intenta de nuevo.');
                console.error('Error inesperado:', err);
            } finally {
                btn.disabled    = false;
                btn.textContent = 'Ingresar';
            }
        }

        function showAlert(type, message) {
            const box = document.getElementById('alertBox');
            box.className     = `alert ${type}`;
            box.textContent   = message;
            box.style.display = 'block';
        }

        function hideAlert() {
            document.getElementById('alertBox').style.display = 'none';
        }

        document.getElementById('copyrightText').textContent =
            `Linaro © ${new Date().getFullYear()} — Todos los derechos reservados`;
    </script>
</body>
</html>
