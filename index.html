<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linaro — Presupuestación Arquitectónica e Interiorismo</title>
<script>
// ============================================================================
// SUPABASE — Cliente REST nativo (sin SDK, sin CDN externo)
// Solo usa fetch() nativo del navegador para máxima optimización
// ============================================================================
(function() {
  var URL  = 'https://iufichpykfkhjednfljy.supabase.co';
  var KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1ZmljaHB5a2ZraGplZG5mbGp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDI3NzMsImV4cCI6MjA5NDYxODc3M30.0OG0e2Oj_5-uJckF-a0duPDgBmgyYr-3VLJm3HvQRVM';
  var SESSION_KEY = 'linaro_session';

  function authHeaders(token) {
    var h = { 'apikey': KEY, 'Content-Type': 'application/json' };
    if (token) h['Authorization'] = 'Bearer ' + token;
    else h['Authorization'] = 'Bearer ' + KEY;
    return h;
  }

  window.supabaseClient = {
    _token: null,
    _user: null,

    auth: {
      signInWithPassword: async function(opts) {
        var r = await fetch(URL + '/auth/v1/token?grant_type=password', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ email: opts.email, password: opts.password })
        });
        var d = await r.json();
        if (!r.ok) return { data: null, error: { message: d.error_description || d.msg || 'Error de autenticación' } };
        window.supabaseClient._token = d.access_token;
        window.supabaseClient._user  = d.user;
        sessionStorage.setItem(SESSION_KEY, JSON.stringify({ token: d.access_token, user: d.user }));
        return { data: { user: d.user, session: d }, error: null };
      },
      getSession: async function() {
        try {
          var saved = JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null');
          if (saved && saved.token) {
            window.supabaseClient._token = saved.token;
            window.supabaseClient._user  = saved.user;
            return { data: { session: saved }, error: null };
          }
        } catch(e) {}
        return { data: { session: null }, error: null };
      },
      signOut: async function() {
        sessionStorage.removeItem(SESSION_KEY);
        window.supabaseClient._token = null;
        window.supabaseClient._user  = null;
        return { error: null };
      }
    },

    from: function(table) {
      var _table = table;
      var _filters = [];
      var _order   = null;
      var _single  = false;

      var q = {
        select: function(cols) { q._cols = cols || '*'; return q; },
        insert: async function(payload) {
          var body = Array.isArray(payload) ? payload : [payload];
          var r = await fetch(URL + '/rest/v1/' + _table, {
            method: 'POST',
            headers: Object.assign(authHeaders(window.supabaseClient._token), { 'Prefer': 'return=minimal' }),
            body: JSON.stringify(body)
          });
          if (!r.ok) { var e = await r.json(); return { error: { message: e.message || 'Error al insertar' } }; }
          return { error: null };
        },
        delete: function() { q._delete = true; return q; },
        eq: function(col, val) { _filters.push(col + '=eq.' + val); return q; },
        order: function(col, opts) { _order = col + '.' + ((opts && opts.ascending === false) ? 'desc' : 'asc'); return q; },
        single: function() { _single = true; return q; },
        then: async function(resolve, reject) {
          try {
            var qs = 'select=' + (q._cols || '*');
            qs += (_filters.length ? '&' + _filters.join('&') : '');
            if (_order) qs += (qs ? '&' : '') + 'order=' + _order
